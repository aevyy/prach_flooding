# ra-spoof operational and test knobs
# Precedence: built-in default < yaml < CLI flag

tx:
  gain_db: 55
  preamble_index: 0
  device_args: "type=b200"

cfo:
  correct: false
  sign: 1
  manual_hz: 0.0

timing:
  tx_offset_us: 0.0
  ssb_first_symbol_override: -1

freq:
  msg1_freq_start_override: -1

run:
  continuous: true
  max_tx: 9999999
  resync_every: 0

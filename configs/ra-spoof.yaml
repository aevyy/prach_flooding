# ra-spoof operational and test knobs
# Precedence: built-in default < yaml < CLI flag

tx:
  gain_db: 55
  preamble_index: 0
  device_args: "type=b200"

cfo:
  correct: false
  sign: 1
  manual_hz: 0.0

timing:
  tx_offset_us: 0.0                    # manual timing nudge (sweep param)
  ssb_first_symbol_override: -1        # -1 = spec value; >=0 = forced
  rx_to_tx_cal_s: 0.0                  # fixed device RX->TX stream calibration offset
  resync_cp_fraction: 0.3              # fraction of CP duration for re-anchor watchdog
  max_time_since_sync_ms: 0.0          # hard re-anchor timeout (0 = disabled)

freq:
  msg1_freq_start_override: -1

run:
  continuous: true
  max_tx: 99999999
  resync_every: 0

flood:
  enabled: true
  num_preambles: 8
  strategy: "superimpose"
  power_backoff_db: 0.0
  slm_candidates: 32                   # SLM phase search count (0 = Newman phases)
  max_preambles_per_occasion: 16       # per-occasion subset cap
  papr_backoff_db: 3.0                 # peak backoff below full-scale (dB)

multi_ro:
  freq_pos_count: 1

ssb_fit:
  fit_window_m: 8                      # number of SSB anchors for clock-drift LS fit
  regen_period_occasions: 0            # 0 = only at init; N = regen every N occasions

# prach-inject operational config
# Precedence: built-in default < yaml < CLI flag

tx:
  gain_db: 55
  preamble_index: 0
  device_args: "type=b200"

cfo:
  correct: false
  sign: 1
  manual_hz: 0.0

timing:
  tx_offset_us: 0.0
  ssb_first_symbol_override: -1

freq:
  msg1_freq_start_override: -1

run:
  continuous: true
  max_tx: 99999999
  resync_every: 0

flood:
  enabled: true           # enable multi-preamble flood mode
  num_preambles: 8        # preambles per occasion (1–64); see tool_config.h for list syntax
  strategy: "superimpose" # "superimpose" = coherent sum in one burst
                          # "cycle" = one preamble per occasion, rotating 0..N-1
  power_backoff_db: 0.0   # backoff from DAC full-scale (negative dB = attenuate)
